<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- RaxisLab symbol — tema claro: #0057ff, sin glow -->

  <!-- Left spine outer -->
  <line x1="16" y1="16" x2="16" y2="94" stroke="#0057ff" stroke-width="3.8"/>
  <line x1="23" y1="23" x2="23" y2="88" stroke="#0057ff" stroke-width="2.2"/>

  <!-- Top horizontal -->
  <line x1="16" y1="16" x2="72" y2="16" stroke="#0057ff" stroke-width="3.8"/>
  <line x1="23" y1="23" x2="66" y2="23" stroke="#0057ff" stroke-width="2.2"/>

  <!-- R Arch right (outer) -->
  <polyline points="72,16 84,28 84,50 72,62" stroke="#0057ff" stroke-width="3.8" stroke-linejoin="miter" fill="none"/>
  <!-- R Arch right (inner) -->
  <polyline points="66,23 76,33 76,46 66,56" stroke="#0057ff" stroke-width="2.2" stroke-linejoin="miter" fill="none"/>

  <!-- Middle crossbar -->
  <line x1="23" y1="56" x2="72" y2="56" stroke="#0057ff" stroke-width="3.8"/>
  <line x1="23" y1="62" x2="66" y2="62" stroke="#0057ff" stroke-width="2.2"/>

  <!-- Left leg (foot) -->
  <line x1="16" y1="94" x2="36" y2="94" stroke="#0057ff" stroke-width="3.8"/>
  <line x1="23" y1="88" x2="38" y2="88" stroke="#0057ff" stroke-width="2.2"/>

  <!-- Diagonal leg (outer + inner) -->
  <line x1="50" y1="62" x2="78" y2="94" stroke="#0057ff" stroke-width="3.8"/>
  <line x1="44" y1="62" x2="70" y2="94" stroke="#0057ff" stroke-width="2.2"/>
  <!-- Bottom foot of diagonal leg -->
  <line x1="66" y1="94" x2="78" y2="94" stroke="#0057ff" stroke-width="3.8"/>

  <!-- Knot center — X crossing (over/under) -->
  <line x1="32" y1="38" x2="55" y2="62" stroke="#0057ff" stroke-width="2.8"/>
  <line x1="55" y1="38" x2="32" y2="62" stroke="#0057ff" stroke-width="2.8"/>
  <!-- Mask center of strand B (white = background) -->
  <rect x="38" y="46" width="10" height="8" fill="#ffffff"/>
  <!-- Redraw strand A over the mask -->
  <line x1="32" y1="38" x2="46" y2="52" stroke="#0057ff" stroke-width="2.8"/>
  <!-- Redraw strand B below the knot -->
  <line x1="41" y1="51" x2="32" y2="62" stroke="#0057ff" stroke-width="2.8"/>

  <!-- Arrow — top-right corner -->
  <line x1="72" y1="16" x2="104" y2="16" stroke="#0057ff" stroke-width="3.8"/>
  <line x1="104" y1="16" x2="104" y2="48" stroke="#0057ff" stroke-width="3.8"/>
  <line x1="84" y1="23" x2="98" y2="23" stroke="#0057ff" stroke-width="2.2"/>
  <line x1="98" y1="23" x2="98" y2="42" stroke="#0057ff" stroke-width="2.2"/>
  <line x1="84" y1="28" x2="102" y2="46" stroke="#0057ff" stroke-width="2.8"/>
  <polygon points="104,16 92,16 104,28" fill="#0057ff"/>
</svg>
