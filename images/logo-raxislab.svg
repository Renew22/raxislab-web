<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none" aria-label="RaxisLab">
  <!-- 
    Símbolo: monograma angular tipo R/emblema técnico
    Proporción símbolo ~1.3:1 (alto x ancho)
    Trazo uniforme, esquinas angulares, flecha arriba-derecha
    Entrelazado central con dos vacíos romboidales
  -->
  <g transform="translate(2, 2) scale(0.88)">
    <!-- MARCO EXTERIOR IZQUIERDO: borde izquierdo + superior + brazo superior derecho -->
    <!-- Lado izquierdo vertical completo -->
    <path d="M4 2 L4 44 L10 44 L10 22 L8 18 L10 14 L10 2 Z" fill="#0057ff"/>
    <!-- Techo horizontal (parte izquierda) -->
    <path d="M4 2 L28 2 L28 7 L10 7 L10 2 Z" fill="#0057ff"/>
    <!-- Travesaño medio (barriga de la R) -->
    <path d="M10 18 L26 18 L26 22 L10 22 Z" fill="#0057ff"/>
    <!-- Cierre curvo superior derecho (barriga R: bajada vertical del brazo) -->
    <path d="M23 7 L28 7 L28 18 L23 18 L23 7 Z" fill="#0057ff"/>

    <!-- PATAS DIAGONALES (piernas de la R/K) -->
    <!-- Pierna izquierda: baja desde el travesaño hacia abajo-izquierda -->
    <path d="M10 22 L4 44 L10 44 L14 28 L10 22 Z" fill="#0057ff"/>
    <!-- Pierna derecha: baja desde el travesaño hacia abajo-derecha -->
    <path d="M26 22 L32 44 L38 44 L30 22 Z" fill="#0057ff"/>

    <!-- NUDO / ENTRELAZADO CENTRAL: dos rombos vacíos cruzados -->
    <!-- Rombo superior (vacío = blanco sobre azul) -->
    <polygon points="19,10 24,15 19,20 14,15" fill="white"/>
    <!-- Rombo inferior -->
    <polygon points="19,22 24,27 19,32 14,27" fill="white"/>
    <!-- Banda de cruce (over) que "pasa por encima" del rombo inferior -->
    <path d="M14 27 L19 22 L24 27" stroke="#0057ff" stroke-width="4" stroke-linejoin="round" fill="none"/>

    <!-- FLECHA SUPERIOR DERECHA: sale desde esquina superior derecha del símbolo -->
    <!-- Línea diagonal de la flecha -->
    <path d="M28 4 L44 2" stroke="#0057ff" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Cabeza de flecha (triángulo) -->
    <path d="M36 0 L46 0 L46 10" stroke="#0057ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- WORDMARK -->
  <!-- "RAXIS" en bold, negro -->
  <text
    x="56" y="33"
    font-family="'DM Sans', 'Inter', system-ui, sans-serif"
    font-size="21"
    font-weight="700"
    letter-spacing="-0.055em"
    fill="#0a0a0a"
  >RAXIS</text>
  <!-- "LAB" en light, azul acento -->
  <text
    x="121" y="33"
    font-family="'DM Sans', 'Inter', system-ui, sans-serif"
    font-size="21"
    font-weight="300"
    letter-spacing="-0.03em"
    fill="#0057ff"
  >LAB</text>
</svg>
