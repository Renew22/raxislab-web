<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <filter id="gl" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bounds">
      <rect x="0" y="0" width="120" height="120"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bounds)" filter="url(#gl)">

    <!-- ═══ OUTER LEFT VERTICAL SPINE ═══ -->
    <line x1="16" y1="16" x2="16" y2="94" stroke="#00C8FF" stroke-width="3.8"/>
    <line x1="23" y1="23" x2="23" y2="88" stroke="#00C8FF" stroke-width="2.2"/>

    <!-- ═══ TOP HORIZONTAL ═══ -->
    <line x1="16" y1="16" x2="72" y2="16" stroke="#00C8FF" stroke-width="3.8"/>
    <line x1="23" y1="23" x2="66" y2="23" stroke="#00C8FF" stroke-width="2.2"/>

    <!-- ═══ R ARCH RIGHT (outer) ═══ -->
    <polyline points="72,16 84,28 84,50 72,62" stroke="#00C8FF" stroke-width="3.8" stroke-linejoin="miter" fill="none"/>
    <!-- R ARCH RIGHT (inner) -->
    <polyline points="66,23 76,33 76,46 66,56" stroke="#00C8FF" stroke-width="2.2" stroke-linejoin="miter" fill="none"/>

    <!-- ═══ R MIDDLE CROSSBAR ═══ -->
    <line x1="23" y1="56" x2="72" y2="56" stroke="#00C8FF" stroke-width="3.8"/>
    <line x1="23" y1="62" x2="66" y2="62" stroke="#00C8FF" stroke-width="2.2"/>

    <!-- ═══ R LEFT LEG (bottom-left foot) ═══ -->
    <line x1="16" y1="94" x2="36" y2="94" stroke="#00C8FF" stroke-width="3.8"/>
    <line x1="23" y1="88" x2="38" y2="88" stroke="#00C8FF" stroke-width="2.2"/>

    <!-- ═══ R DIAGONAL LEG (outer) ═══ -->
    <line x1="50" y1="62" x2="78" y2="94" stroke="#00C8FF" stroke-width="3.8"/>
    <!-- R DIAGONAL LEG (inner parallel) -->
    <line x1="44" y1="62" x2="70" y2="94" stroke="#00C8FF" stroke-width="2.2"/>
    <!-- Bottom of R right leg foot -->
    <line x1="66" y1="94" x2="78" y2="94" stroke="#00C8FF" stroke-width="3.8"/>

    <!-- ═══ KNOT CENTER — X crossing ═══ -->
    <!-- Strand A: top-left to bottom-right -->
    <line x1="32" y1="38" x2="55" y2="62" stroke="#00C8FF" stroke-width="2.8"/>
    <!-- Strand B: top-right to bottom-left (goes under A at center) -->
    <line x1="55" y1="38" x2="32" y2="62" stroke="#00C8FF" stroke-width="2.8"/>
    <!-- Mask out center of B to simulate under/over knot -->
    <rect x="38" y="46" width="10" height="8" fill="#000000"/>
    <!-- Redraw top of strand A (over segment) -->
    <line x1="32" y1="38" x2="46" y2="52" stroke="#00C8FF" stroke-width="2.8"/>
    <!-- Redraw bottom of strand B after knot break -->
    <line x1="41" y1="51" x2="32" y2="62" stroke="#00C8FF" stroke-width="2.8"/>

    <!-- ═══ ARROW — top-right corner ═══ -->
    <!-- Arrow horizontal top -->
    <line x1="72" y1="16" x2="104" y2="16" stroke="#00C8FF" stroke-width="3.8"/>
    <!-- Arrow vertical right -->
    <line x1="104" y1="16" x2="104" y2="48" stroke="#00C8FF" stroke-width="3.8"/>
    <!-- Inner parallel horizontal -->
    <line x1="84" y1="23" x2="98" y2="23" stroke="#00C8FF" stroke-width="2.2"/>
    <!-- Inner parallel vertical -->
    <line x1="98" y1="23" x2="98" y2="42" stroke="#00C8FF" stroke-width="2.2"/>
    <!-- Arrow diagonal shaft -->
    <line x1="84" y1="28" x2="102" y2="46" stroke="#00C8FF" stroke-width="2.8"/>
    <!-- Arrowhead filled -->
    <polygon points="104,16 92,16 104,28" fill="#00C8FF"/>
    <!-- Arrow tip detail lines -->
    <line x1="96" y1="16" x2="104" y2="24" stroke="#000" stroke-width="1.5"/>

  </g>
</svg>
